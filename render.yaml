services:
  # Backend Web Service
  - type: web
    name: civicresq-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false

  # Frontend Web Service
  - type: web
    name: civicresq-frontend
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          type: web
          name: civicresq-backend
          envVarKey: RENDER_INTERNAL_HOSTNAME
